name: Cron — ingest & notify

# Hourly scheduler for EarlyBird. The app is hosted on Vercel (free Hobby plan,
# which only allows once-a-day Vercel Cron), so we drive ingestion + notifications
# from GitHub Actions instead — its scheduled trigger is free and runs hourly.
#
# Setup (one time): add two repository secrets under
# Settings → Secrets and variables → Actions:
#   DEPLOY_URL   the public base URL of the deployment, e.g. https://earlybird.vercel.app
#   CRON_SECRET  the same value set as CRON_SECRET in the Vercel project env
on:
  schedule:
    - cron: "5 * * * *" # every hour at :05 past (UTC) — offset off the busy top-of-hour
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Don't pile up overlapping runs if one is slow.
concurrency:
  group: earlybird-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # Ingest first so notifications see the freshest listings.
      # --retry rides out transient network blips / cold starts. -f makes HTTP
      # errors fail the step; we additionally surface per-source failures (which
      # the endpoint reports in its 200 body) as a warning.
      - name: Ingest new listings
        run: |
          resp=$(curl -fsS --max-time 300 --retry 3 --retry-delay 10 --retry-all-errors \
            -X POST "$DEPLOY_URL/api/ingest" -H "x-cron-secret: $CRON_SECRET")
          echo "$resp" | jq .
          failed=$(echo "$resp" | jq '.summary.failedSources // 0')
          if [ "$failed" -gt 0 ]; then
            echo "::warning title=Ingest::$failed source(s) failed to fetch this run"
          fi
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Send notifications
        run: |
          resp=$(curl -fsS --max-time 300 --retry 3 --retry-delay 10 --retry-all-errors \
            -X POST "$DEPLOY_URL/api/notify" -H "x-cron-secret: $CRON_SECRET")
          echo "$resp" | jq .
          errs=$(echo "$resp" | jq '[.summary.results[]? | select(.error)] | length')
          if [ "$errs" -gt 0 ]; then
            echo "::warning title=Notify::$errs preference(s) failed to send this run"
          fi
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
