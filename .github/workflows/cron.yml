name: Cron — ingest & notify

# Hourly scheduler for EarlyBird. The app is hosted on Vercel (free Hobby plan,
# which only allows once-a-day Vercel Cron), so GitHub Actions drives the cron —
# free and hourly.
#
# Ingest runs DIRECTLY on the runner (npm run ingest), not via the Vercel
# endpoint: it fans out across 40+ company ATS boards and would blow past
# Vercel's 60s function cap. Notify stays a quick call to the deployed endpoint.
#
# Setup (one time) — repository secrets under
# Settings → Secrets and variables → Actions:
#   DATABASE_URL  the Neon Postgres connection string (for the ingest step)
#   DEPLOY_URL    public base URL of the deployment, e.g. https://earlybird.vercel.app
#   CRON_SECRET   the same value set as CRON_SECRET in the Vercel project env
on:
  schedule:
    - cron: "5 * * * *" # every hour at :05 past (UTC) — offset off the busy top-of-hour
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Don't pile up overlapping runs if one is slow.
concurrency:
  group: earlybird-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate

      # Ingest directly on the runner — all sources (aggregators + ATS boards).
      # ingestAll() never throws; per-source failures are printed in the summary.
      - name: Ingest new listings (all sources)
        run: npm run ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Notify via the deployed endpoint (light; fits the 60s cap). --retry rides
      # out transient blips; surface per-preference send failures as a warning.
      - name: Send notifications
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "DEPLOY_URL is not set — skipping notify. Deploy to Vercel and add the"
            echo "DEPLOY_URL + CRON_SECRET repo secrets to enable email/Discord/Telegram alerts."
            exit 0
          fi
          resp=$(curl -fsS --max-time 300 --retry 3 --retry-delay 10 --retry-all-errors \
            -X POST "$DEPLOY_URL/api/notify" -H "x-cron-secret: $CRON_SECRET")
          echo "$resp" | jq .
          errs=$(echo "$resp" | jq '[.summary.results[]? | select(.error)] | length')
          if [ "$errs" -gt 0 ]; then
            echo "::warning title=Notify::$errs preference(s) failed to send this run"
          fi
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
